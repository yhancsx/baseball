    <style>
        /* ── 연도 탭 ── */
        .year-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .year-tab {
            padding: 10px 28px;
            border: 2px solid #667eea;
            border-radius: 25px;
            background: transparent;
            color: #667eea;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .year-tab:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .year-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* ── 필터 컨트롤 ── */
        .filter-controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .slider-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: #f7fafc;
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            flex-wrap: wrap;
            justify-content: center;
        }

        .slider-wrapper label {
            color: #4a5568;
            font-size: 0.95em;
            font-weight: 600;
        }

        .slider-wrapper input[type="range"] {
            -webkit-appearance: none;
            width: 150px;
            height: 6px;
            background: #cbd5e0;
            border-radius: 5px;
            outline: none;
        }
        
        .slider-wrapper input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(102,126,234,0.4);
        }

        .slider-wrapper input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #764ba2;
        }

        .slider-value {
            font-size: 0.95em;
            font-weight: 700;
            color: #667eea;
            min-width: 80px;
            text-align: left;
        }

        /* ── 로딩 / 에러 ── */
        .status-message {
            text-align: center;
            padding: 40px;
            color: #718096;
            font-size: 1.1em;
        }

        /* ── 테이블 ── */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        
        table.table-compact {
            min-width: 100%;
        }

        thead {
            background: #667eea;
            color: white;
        }

        thead th {
            padding: 14px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.88em;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
            position: relative;
        }

        thead th:hover {
            background: rgba(255,255,255,0.15);
        }

        thead th:first-child {
            border-radius: 10px 0 0 0;
        }

        thead th:last-child {
            border-radius: 0 10px 0 0;
        }

        .sort-icon {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.75em;
            opacity: 0.5;
        }

        thead th.sort-asc .sort-icon,
        thead th.sort-desc .sort-icon {
            opacity: 1;
        }

        /* 정렬된 컬럼 강조 (헤더) */
        thead th.col-sorted {
            background: rgba(255, 255, 255, 0.2);
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f0f4ff;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody td {
            padding: 13px 12px;
            color: #4a5568;
            text-align: center;
            font-size: 0.9em;
            white-space: nowrap;
        }

        /* 이름 컬럼 왼쪽 정렬 + sticky */
        tbody td.td-name {
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            min-width: 60px;
        }

        /* sticky 고정 컬럼 */

            left: 0;

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    <script>
        // ── 컬럼 정의 ──
        // 앞쪽 고정 우선순위 컬럼, 이후 나머지는 JSON 원순서로 동적 추가
        // computed: true 인 컬럼은 JSON 원본 키가 없고 JS에서 계산
        const PRIMARY_COLUMNS = [
            { key: '이름',    label: '이름' },
            { key: '타율',    label: '타율' },
            { key: '장타율',  label: '장타율' },
            { key: '출루율',  label: '출루율' },
            { key: 'OPS',     label: 'OPS' },
            { key: '삼진율',  label: '삼진율', computed: true },
            { key: 'wRC+',    label: 'wRC+' },
            { key: '타석',    label: '타석' },
            { key: '타수',    label: '타수' },
            { key: '총안타',  label: '총안타' },
            { key: '볼넷',    label: '볼넷' },
            { key: 'BB/K',    label: 'BB/K' },
        ];

        // 순위 컬럼은 테이블에서 미노출
        const HIDDEN_KEYS = new Set(['순위', '도실 (도루자)', '고의 4구', '도루 성공률']);

        const PRIMARY_KEYS = new Set(PRIMARY_COLUMNS.map(c => c.key));

        // 정렬 상태
        let sortKey = '타율';
        let sortAsc = false; // 기본: 타율 내림차순

        // 기본 타석 설정값 (총 경기수 × 배수 = 최초 슬라이더 세팅 기준)
        const MIN_PA_MULTIPLIER = 1;

        // 현재 데이터 캐시
        let currentData = [];
        let currentColumns = [];
        let currentYear = 2026;

        // ── 연도 로드 ──
        function loadYear(year) {
            currentYear = year;

            // 탭 활성화
            document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + year).classList.add('active');

            // 컬럼 수에 따른 테이블 너비 모드 전환
            const hitTable = document.getElementById('hit-table');
            if (year === 'all') {
                hitTable.classList.add('table-compact');
            } else {
                hitTable.classList.remove('table-compact');
            }

            // UI 초기화
            document.getElementById('table-wrapper').style.display = 'none';
            document.getElementById('status-message').style.display = 'block';
            document.getElementById('status-message').textContent = '데이터를 불러오는 중...';

            if (year === 'all') {
                Promise.all([
                    fetch('./2024_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2025_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2026_hit.json').then(r => r.ok ? r.json() : [])
                ])
                .then(datasets => {
                    currentData = mergeAllYears(datasets);
                    computeAdvancedStats(currentData);
                    buildColumns(currentData);
                    updateSliderBoundary();
                    renderTable();
                    document.getElementById('status-message').style.display = 'none';
                    document.getElementById('table-wrapper').style.display = 'block';
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('status-message').textContent = '데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                });
            } else {
                const url = `./${year}_hit.json`;

                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(data => {
                        currentData = data;
                        computeAdvancedStats(currentData);
                        buildColumns(data);
                        updateSliderBoundary();
                        renderTable();
                        document.getElementById('status-message').style.display = 'none';
                        document.getElementById('table-wrapper').style.display = 'block';
                    })
                    .catch(err => {
                        console.error(err);
                        document.getElementById('status-message').textContent =
                            '데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.';
                    });
            }
        }

        // ── 고급 스탯 계산 (wRC, wRC+) ──
        function computeAdvancedStats(data) {
            let t_ab=0, t_h=0, t_bb=0, t_hbp=0, t_sf=0, t_ibb=0, t_r=0, t_pa=0;
            let t_1b=0, t_2b=0, t_3b=0, t_hr=0;

            // 1. 팀 전체 합계 계산
            data.forEach(p => {
                t_ab += parseFloat(p['타수']) || 0;
                t_h += parseFloat(p['총안타']) || 0;
                t_bb += parseFloat(p['볼넷']) || 0;
                t_hbp += parseFloat(p['사구']) || 0;
                t_sf += parseFloat(p['희비']) || 0;
                t_ibb += parseFloat(p['고의 4구']) || 0;
                t_r += parseFloat(p['득점']) || 0;
                t_pa += parseFloat(p['타석']) || 0;
                t_1b += parseFloat(p['1루타']) || 0;
                t_2b += parseFloat(p['2루타']) || 0;
                t_3b += parseFloat(p['3루타']) || 0;
                t_hr += parseFloat(p['홈런']) || 0;
            });

            // 2. 팀 평균 wOBA 및 wOBA Scale 도출
            const t_obp_den = t_ab + t_bb + t_hbp + t_sf;
            const t_obp = t_obp_den > 0 ? (t_h + t_bb + t_hbp) / t_obp_den : 0;

            const t_woba_den = t_ab + t_bb - t_ibb + t_sf + t_hbp;
            const t_unscaled_woba = t_woba_den > 0 ? 
                (0.69*(t_bb - t_ibb) + 0.722*t_hbp + 0.888*t_1b + 1.271*t_2b + 1.616*t_3b + 2.101*t_hr) / t_woba_den : 0;

            const woba_scale = (t_unscaled_woba > 0 && t_obp > 0) ? t_obp / t_unscaled_woba : 1.2;
            const team_woba = t_unscaled_woba * woba_scale;
            const team_r_pa = t_pa > 0 ? t_r / t_pa : 0;

            // 3. 개별 선수 wRC, wRC+ 계산
            data.forEach(p => {
                const ab = parseFloat(p['타수']) || 0;
                const bb = parseFloat(p['볼넷']) || 0;
                const hbp = parseFloat(p['사구']) || 0;
                const sf = parseFloat(p['희비']) || 0;
                const ibb = parseFloat(p['고의 4구']) || 0;
                const p_1b = parseFloat(p['1루타']) || 0;
                const p_2b = parseFloat(p['2루타']) || 0;
                const p_3b = parseFloat(p['3루타']) || 0;
                const hr = parseFloat(p['홈런']) || 0;
                const pa = parseFloat(p['타석']) || 0;

                const woba_den = ab + bb - ibb + sf + hbp;
                const unscaled_woba = woba_den > 0 ? 
                    (0.69*(bb - ibb) + 0.722*hbp + 0.888*p_1b + 1.271*p_2b + 1.616*p_3b + 2.101*hr) / woba_den : 0;
                const woba = unscaled_woba * woba_scale;
                
                let wrc_plus = 0;

                if (pa > 0) {
                    const wraa = ((woba - team_woba) / woba_scale) * pa;
                    
                    if (team_r_pa > 0) {
                        wrc_plus = ((wraa / pa) + team_r_pa) / team_r_pa * 100;
                    }
                }

                p['wRC+'] = Math.round(wrc_plus).toString();
            });
        }

        // ── 슬라이더 조작 ──
        function updateSliderBoundary() {
            if (!currentData || currentData.length === 0) return;
            
            let minPA = Infinity;
            let maxPA = -Infinity;
            let maxGames = 0;
            
            currentData.forEach(p => {
                const pa = parseFloat(p['타석']) || 0;
                const games = parseInt(p['게임수']) || 0;
                
                if (pa < minPA) minPA = pa;
                if (pa > maxPA) maxPA = pa;
                if (games > maxGames) maxGames = games;
            });
            
            if (minPA === Infinity) minPA = 0;
            if (maxPA === -Infinity) maxPA = 0;
            
            const defaultRequiredPA = maxGames * MIN_PA_MULTIPLIER;
            
            const slider = document.getElementById('pa-slider');
            slider.min = minPA;
            slider.max = maxPA;
            slider.value = defaultRequiredPA;
            
            document.getElementById('pa-slider-value').textContent = slider.value;
        }

        function updateSliderValue() {
            const slider = document.getElementById('pa-slider');
            document.getElementById('pa-slider-value').textContent = slider.value;
            renderTable();
        }

        // ── 컬럼 목록 구성 (primary + 나머지) ──
        function buildColumns(data) {
            if (!data || data.length === 0) {
                currentColumns = PRIMARY_COLUMNS;
                return;
            }

            if (currentYear === 'all') {
                const allowedKeys = new Set(['이름', '타율', '장타율', '출루율', 'OPS', '삼진율', 'wRC+']);
                currentColumns = PRIMARY_COLUMNS.filter(c => allowedKeys.has(c.key));
                return;
            }

            const allKeys = Object.keys(data[0]);
            const remainingColumns = allKeys
                .filter(k => !PRIMARY_KEYS.has(k) && !HIDDEN_KEYS.has(k))
                .map(k => ({ key: k, label: k }));

            currentColumns = [...PRIMARY_COLUMNS, ...remainingColumns];
        }

        // ── 테이블 렌더링 ──
        function renderTable() {
            renderHeader();
            renderBody();
        }

        function renderHeader() {
            const headerRow = document.getElementById('table-header');
            headerRow.innerHTML = '';

            currentColumns.forEach((col) => {
                const th = document.createElement('th');

                if (col.key === '이름') th.classList.add('col-sticky');

                // 정렬 상태 클래스
                if (col.key === sortKey) {
                    th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
                    th.classList.add('col-sorted');
                }

                const iconChar = col.key === sortKey ? (sortAsc ? '▲' : '▼') : '⇅';
                th.innerHTML = `${col.label}<span class="sort-icon">${iconChar}</span>`;
                th.dataset.key = col.key;
                th.addEventListener('click', () => onHeaderClick(col.key));
                headerRow.appendChild(th);
            });
        }

        function renderBody() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const slider = document.getElementById('pa-slider');
            const filterValue = parseFloat(slider.value) || 0;
            let displayData = currentData.filter(p => {
                const pa = parseFloat(p['타석']) || 0;
                return pa >= filterValue;
            });

            const sorted = displayData.sort((a, b) => {
                // computed 컬럼(삼진율)은 직접 계산
                const getVal = (player, key) => {
                    if (key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        return (!isNaN(k) && !isNaN(pa) && pa > 0) ? k / pa : -Infinity;
                    }
                    return player[key];
                };
                const va = getVal(a, sortKey);
                const vb = getVal(b, sortKey);
                const na = parseFloat(va);
                const nb = parseFloat(vb);
                let cmp;
                if (!isNaN(na) && !isNaN(nb)) {
                    cmp = na - nb;
                } else {
                    cmp = String(va).localeCompare(String(vb), 'ko');
                }
                return sortAsc ? cmp : -cmp;
            });

            // 타율 강조 컬럼 키 셋
            const rateKeys = new Set(['타율', '장타율', '출루율', 'OPS', '삼진율', 'wRC+']);

            // 각 컬럼별 최대값 찾기 (이름 컬럼 제외)
            const maxValues = {};
            currentColumns.forEach(col => {
                if (col.key === '이름') return;

                let max = -Infinity;
                sorted.forEach(player => {
                    let numVal;
                    if (col.computed && col.key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        numVal = (!isNaN(k) && !isNaN(pa) && pa > 0) ? parseFloat((k / pa).toFixed(3)) : -Infinity;
                    } else {
                        numVal = parseFloat(player[col.key]);
                    }
                    if (!isNaN(numVal) && numVal > max) {
                        max = numVal;
                    }
                });
                maxValues[col.key] = max;
            });

            sorted.forEach((player) => {
                const tr = document.createElement('tr');

                currentColumns.forEach((col) => {
                    const td = document.createElement('td');

                    // computed 컬럼 처리
                    let val;
                    let numVal;
                    if (col.computed && col.key === '삼진율') {
                        const k = parseFloat(player['삼진']);
                        const pa = parseFloat(player['타석']);
                        if (!isNaN(k) && !isNaN(pa) && pa > 0) {
                            val = (k / pa).toFixed(3);
                            numVal = parseFloat(val);
                        } else {
                            val = '-';
                        }
                    } else {
                        val = player[col.key] !== undefined ? player[col.key] : '-';
                        numVal = parseFloat(val);
                    }

                    if (col.key === '이름') {
                        td.classList.add('td-name');
                        td.classList.add('col-sticky');
                    } else if (rateKeys.has(col.key)) {
                        td.classList.add('td-rate');
                    }

                    // 최대값(1위) 강조 (단, 0보다 큰 경우만)
                    if (col.key !== '이름' && !isNaN(numVal) && numVal === maxValues[col.key] && maxValues[col.key] > 0) {
                        td.classList.add('td-max');
                    }

                    // 이름 컬럼: 괄호+번호 제거 (예: '박현규(49)' → '박현규')
                    if (col.key === '이름') val = String(val).replace(/\(\d+\)$/, '').trim();
                    td.textContent = val;
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // ── 헤더 클릭 정렬 ──
        function onHeaderClick(key) {
            if (sortKey === key) {
                sortAsc = !sortAsc;
            } else {
                sortKey = key;
                // 이름 컬럼은 기본 오름차순, 나머지는 내림차순
                sortAsc = (key === '이름');
            }
            renderTable();
        }

        // ── 3개년 병합 로직 ──
        const SUM_KEYS = ['게임수','타석','타수','총안타','1루타','2루타','3루타',
                          '홈런','루타','득점','타점','볼넷','사구','삼진',
                          '도루','희타','희비','병살','멀티 히트', '고의 4구', '도실 (도루자)'];

        function mergeAllYears(datasets) {
            const map = new Map();
            for (const data of datasets) {
                for (const player of data) {
                    const name = player['이름'].replace(/\(\d+\)$/, '').trim();
                    if (!map.has(name)) map.set(name, initBlank(name));
                    accumulate(map.get(name), player);
                }
            }
            return [...map.values()].map(recalcRates);
        }

        function initBlank(name) {
            const obj = { '이름': name };
            SUM_KEYS.forEach(k => obj[k] = 0);
            return obj;
        }

        function accumulate(acc, player) {
            SUM_KEYS.forEach(k => {
                acc[k] = (acc[k] || 0) + (parseFloat(player[k]) || 0);
            });
        }

        function recalcRates(p) {
            const ab = p['타수'], h = p['총안타'], tb = p['루타'];
            const bb = p['볼넷'], hbp = p['사구'], sf = p['희비'];

            const avg = ab > 0 ? (h / ab) : 0;
            const slg = ab > 0 ? (tb / ab) : 0;
            const obp = (ab + bb + hbp + sf) > 0
                ? (h + bb + hbp) / (ab + bb + hbp + sf)
                : 0;
            const ops = slg + obp;

            return {
                ...p,
                '타율': avg.toFixed(3),
                '장타율': slg.toFixed(3),
                '출루율': obp.toFixed(3),
                'OPS': ops.toFixed(3)
            };
        }

        // ── 초기 로드 (현재 연도 기본: 가장 최신) ──
        document.addEventListener('DOMContentLoaded', () => {
            loadYear(2026);
        });

        // ── AI 라인업 추천 관련 ──
        let allPlayersData = [];
        
        function openLineupModal() {
            document.getElementById('ai-lineup-modal').style.display = 'flex';
            document.getElementById('recommendation-result').style.display = 'none';
            document.getElementById('recommendation-result').innerHTML = '';
            
            // 데이터 로드
            if (allPlayersData.length === 0) {
                document.getElementById('player-checkboxes').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #718096;">데이터를 불러오는 중...</p>';
                Promise.all([
                    fetch('./2024_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2025_hit.json').then(r => r.ok ? r.json() : []),
                    fetch('./2026_hit.json').then(r => r.ok ? r.json() : [])
                ]).then(([data2024, data2025, data2026]) => {
                    const mergedData = mergeAllYears([data2024, data2025, data2026]);
                    computeAdvancedStats(mergedData); // 3년 전체 기준 wRC 등 계산

                    // 각 선수의 2026년 스탯과 3년 스탯을 분리하여 저장
                    allPlayersData = mergedData.map(player => {
                        const name = player['이름'];
                        const p2026 = data2026.find(p => p['이름'].replace(/\(\d+\)$/, '').trim() === name);
                        
                        // 2026년 데이터가 있으면 가져오고, 없으면 빈 값으로 처리
                        let stats2026 = null;
                        if (p2026) {
                            const p2026Clone = {...p2026};
                            p2026Clone['이름'] = name;
                            const arr = [p2026Clone];
                            computeAdvancedStats(arr); // 2026년 단일 기준 wRC 계산
                            stats2026 = recalcRates(arr[0]);
                        }

                        return {
                            이름: name,
                            statsTotal: player,
                            stats2026: stats2026
                        };
                    });
                    
                    renderPlayerCheckboxes();
                });
            } else {
                renderPlayerCheckboxes();
            }
        }

        function closeLineupModal() {
            document.getElementById('ai-lineup-modal').style.display = 'none';
        }

        function renderPlayerCheckboxes() {
            const container = document.getElementById('player-checkboxes');
            container.innerHTML = '';
            
            // 2026년 경기수 내림차순 정렬 (경기수가 같으면 이름순)
            allPlayersData.sort((a, b) => {
                const gamesA = a.stats2026 ? parseInt(a.stats2026['게임수']) || 0 : 0;
                const gamesB = b.stats2026 ? parseInt(b.stats2026['게임수']) || 0 : 0;
                
                if (gamesB !== gamesA) {
                    return gamesB - gamesA;
                }
                return a.이름.localeCompare(b.이름);
            });

            allPlayersData.forEach((player, index) => {
                const label = document.createElement('label');
                label.className = 'player-checkbox-label';
                // 2026년 경기수 Top 10 기본 체크
                const isChecked = index < 10 ? 'checked' : '';
                label.innerHTML = `<input type="checkbox" value="${index}" ${isChecked} onchange="updateSelectedCount()"> ${player.이름}`;
                container.appendChild(label);
            });
            updateSelectedCount();
        }

        function toggleAllPlayers(checked) {
            const checkboxes = document.querySelectorAll('#player-checkboxes input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('#player-checkboxes input[type="checkbox"]:checked').length;
            document.getElementById('selected-count').textContent = count + '명 선택됨';
        }

        async function getRecommendation() {
            if (typeof CONFIG === 'undefined' || !CONFIG.GEMINI_API_KEY || CONFIG.GEMINI_API_KEY === "YOUR_API_KEY_HERE") {
                alert('API 키가 설정되지 않았습니다. 루트 디렉토리의 config.js 파일을 확인해주세요.');
                return;
            }

            const checkboxes = document.querySelectorAll('#player-checkboxes input[type="checkbox"]:checked');
            if (checkboxes.length < 9) {
                alert('야구 라인업 구성을 위해 최소 9명 이상의 선수를 선택해주세요.');
                return;
            }

            const selectedPlayers = Array.from(checkboxes).map(cb => allPlayersData[cb.value]);
            
            // 프롬프트 데이터 구성
            const promptData = selectedPlayers.map(p => {
                const data = {
                    "이름": p.이름,
                    "3년누적_타율": p.statsTotal['타율'],
                    "3년누적_OPS": p.statsTotal['OPS'],
                    "3년누적_타석": p.statsTotal['타석'],
                    "3년누적_안타": p.statsTotal['총안타'],
                    "3년누적_홈런": p.statsTotal['홈런'],
                    "3년누적_도루": p.statsTotal['도루']
                };
                if (p.stats2026) {
                    data["2026_타율"] = p.stats2026['타율'];
                    data["2026_OPS"] = p.stats2026['OPS'];
                    data["2026_타석"] = p.stats2026['타석'];
                    data["2026_안타"] = p.stats2026['총안타'];
                } else {
                    data["2026_기록없음"] = true;
                }
                return data;
            });

            document.getElementById('loader').style.display = 'block';
            document.getElementById('recommendation-result').style.display = 'none';

            const promptText = `
당신은 세이버메트릭스 기반의 데이터 야구 감독입니다.
오늘 경기에 참석하는 선수들의 타격 스탯(JSON)은 다음과 같습니다.
수비 위치는 고려하지 않고 오직 타격 스탯만을 기반으로 최적의 1~9번 타순(선발 라인업)을 구성하세요.
9명 초과로 참석할 경우, 가장 타격 스탯이 좋은 9명을 선발 라인업으로 구성하고 나머지는 벤치 멤버로 분류해주세요.

제공된 데이터에는 선수의 '3년 누적 스탯'과 '2026년 최신 스탯'이 포함되어 있습니다.
반드시 **2026년(가장 최근) 스탯에 더 높은 가중치**를 두어 평가하세요. 2026년 타석 수가 적더라도 최근 폼을 우선시합니다.

참석 선수 데이터:
${JSON.stringify(promptData, null, 2)}

결과는 마크다운 포맷으로 다음 내용을 포함하여 작성해주세요:
1. 최적의 1~9번 타순 리스트 (이름만 나열하지 말고, 주요 스탯을 함께 표기)
2. 각 선수를 해당 타순에 배치한 명확한 이유 (출루율, 장타율, 최근 폼 등 구체적 수치 언급)
3. (선택사항) 벤치 멤버 명단
4. 전체 라인업의 핵심 전략 요약
`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${CONFIG.GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const result = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                if (result.error) {
                    alert('API 호출 오류: ' + result.error.message);
                    return;
                }

                const markdownText = result.candidates[0].content.parts[0].text;
                const resultContainer = document.getElementById('recommendation-result');
                // marked.js를 이용하여 마크다운을 HTML로 변환
                resultContainer.innerHTML = marked.parse(markdownText);
                resultContainer.style.display = 'block';

            } catch (error) {
                console.error(error);
                document.getElementById('loader').style.display = 'none';
                alert('요청 중 오류가 발생했습니다. 개발자 도구 콘솔을 확인해주세요.');
            }
        }
    </script>
</body>
</html>
