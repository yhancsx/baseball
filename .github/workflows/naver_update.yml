name: Scrape Naver Data

on:
  workflow_dispatch:
  schedule:
    # 매일 아침 8시 KST (KST = UTC+9 → UTC 23:00)
    - cron: "0 23 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (with system deps)
        run: npx playwright install chromium --with-deps

      - name: Run scrapers
        run: |
          npm run scrape:naver:hitter
          npm run scrape:naver:schedule

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add naver/
          git diff --cached --quiet || git commit -m "chore: update NAVER hitter ranking and schedule data"
          git push
